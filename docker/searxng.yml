services:
  searxng:
    image: searxng/searxng
    ports:
      - "${SEARXNG_PORT:-4000}:8080"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - BASE_URL=http://localhost:${SEARXNG_PORT:-4000}
    volumes:
      - searxng_data:/etc/searxng
    restart: unless-stopped

volumes:
  searxng_data:
