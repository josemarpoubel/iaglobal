services:
  # ═══════════════════════════════════════════════════════════════
  # SearXNG — Meta-buscador local (Google + Bing + DuckDuckGo)
  # Docs: https://docs.searxng.org/
  # ═══════════════════════════════════════════════════════════════
  searxng:
    image: searxng/searxng:latest
    container_name: iaglobal_searxng
    network_mode: host
    environment:
      - SEARXNG_BASE_URL=http://localhost:8005
      - SEARXNG_PORT=8005
      - SEARXNG_SECRET_KEY=iaglobal_searxng_secret_2026
      - SEARXNG_BIND_ADDRESS=0.0.0.0
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/search?q=test&format=json > /dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s