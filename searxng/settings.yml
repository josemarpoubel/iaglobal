use_default_settings: true

general:
  debug: false
  instance_name: "iaglobal-search"
  donation_url: false
  contact_url: false
  enable_metrics: true

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "iaglobal_searxng_secret_2026"
  port: 8005
  bind_address: "0.0.0.0"
  limiter: false
  image_proxy: false
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

engines:
  - name: google
    engine: google
    shortcut: go
    disabled: false
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
  - name: wikidata
    engine: wikidata
    shortcut: wd
    disabled: false
  - name: github
    engine: github
    shortcut: gh
    disabled: false
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

ui:
  static_use_hash: true
  default_theme: simple
  themes:
    - simple
    - oscar
    - pixart
  default_locale: "en"
  query_in_title: true
  infinite_scroll: true
  center_alignment: true
  results_on_new_tab: false
  theme_args:
    simple_style: auto

outgoing:
  request_timeout: 15.0
  max_request_timeout: 25.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 50
  enable_http2: true
